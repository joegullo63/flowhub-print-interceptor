name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build and run non-hardware self-test
        shell: powershell
        run: .\scripts\Build.ps1
      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: PrintInterceptorSetup
          path: dist/PrintInterceptorSetup.exe
          if-no-files-found: error

